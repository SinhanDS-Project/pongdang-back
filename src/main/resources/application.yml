server:
  port: ${PORT_NUM}

spring:
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  datasource:
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    url: ${DB_URL}
    driver-class-name: org.mariadb.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    generate-ddl: true
    show-sql: false
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.MariaDBDialect
  security:
    jwt:
      secret: ${JWT_SECRET}
      access-token-expiration: 3600000
      refresh-token-expiration: 1209600000
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_NAME}
    password: ${MAIL_PWD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 10000
          timeout: 15000
          writetimeout: 15000
  jackson:
    property-naming-strategy: SNAKE_CASE

mysql:
  datasource:
    username: ${MYSQL_USERNAME}
    password: ${MYSQL_PASSWORD}
    url: ${MYSQL_URL}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    generate-ddl: true
    show-sql: false
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.MySQL8Dialect

amazon:
  region: ap-northeast-2
  access-key: ${S3_ACCESS}
  secret-key: ${S3_SECRET}
  bucket-name: bettopia-s3-bucket

toss:
  client-key: ${TOSS_CLIENT}
  secret-key: ${TOSS_SECRET}

gemini:
  apiKey: ${GOOGLE_API_KEY}           # 환경변수로 주입
  model: gemini-2.5-flash-lite        # 필요시 변경
  temperature: 0.5
  responseMimeType: application/json
  
coolsms:
  key: ${SMS_KEY}
  secret: ${SMS_SECRET}
  from: ${SMS_PHONE}

data-go:
  api-url: ${DATA_URL}
  service-key: ${DATA_KEY}

ml:
  api:
    url: ${FASTAPI_URL}
